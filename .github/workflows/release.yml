name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Linux x86_64 binaries
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev
      - name: Build (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel
      - name: Package binaries
        run: |
          mkdir -p superscalar-${{ env.TAG }}-linux-x86_64
          cp build/superscalar_lsp \
             build/superscalar_client \
             build/superscalar_bridge \
             build/superscalar_watchtower \
             superscalar-${{ env.TAG }}-linux-x86_64/
          cp README.md LICENSE CHANGELOG.md SECURITY.md \
             superscalar-${{ env.TAG }}-linux-x86_64/
          tar czf superscalar-${{ env.TAG }}-linux-x86_64.tar.gz \
             superscalar-${{ env.TAG }}-linux-x86_64/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ env.TAG }} \
            superscalar-${{ env.TAG }}-linux-x86_64.tar.gz \
            --clobber

  build-linux-arm64:
    runs-on: ubuntu-latest
    name: Linux ARM64 binaries
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            ubuntu:24.04 bash -c '
              apt-get update && apt-get install -y cmake gcc g++ git libsqlite3-dev libssl-dev autoconf libtool
              cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
              cmake --build build --parallel
            '
      - name: Package binaries
        run: |
          mkdir -p superscalar-${{ env.TAG }}-linux-arm64
          cp build/superscalar_lsp \
             build/superscalar_client \
             build/superscalar_bridge \
             build/superscalar_watchtower \
             superscalar-${{ env.TAG }}-linux-arm64/
          cp README.md LICENSE CHANGELOG.md SECURITY.md \
             superscalar-${{ env.TAG }}-linux-arm64/
          tar czf superscalar-${{ env.TAG }}-linux-arm64.tar.gz \
             superscalar-${{ env.TAG }}-linux-arm64/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ env.TAG }} \
            superscalar-${{ env.TAG }}-linux-arm64.tar.gz \
            --clobber

  build-macos:
    runs-on: macos-latest
    name: macOS binaries
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
      - name: Build (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel
      - name: Package binaries
        run: |
          mkdir -p superscalar-${{ env.TAG }}-macos
          cp build/superscalar_lsp \
             build/superscalar_client \
             build/superscalar_bridge \
             build/superscalar_watchtower \
             superscalar-${{ env.TAG }}-macos/
          cp README.md LICENSE CHANGELOG.md SECURITY.md \
             superscalar-${{ env.TAG }}-macos/
          tar czf superscalar-${{ env.TAG }}-macos.tar.gz \
             superscalar-${{ env.TAG }}-macos/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ env.TAG }} \
            superscalar-${{ env.TAG }}-macos.tar.gz \
            --clobber

  hashes:
    name: SHA256SUMS
    needs: [build-linux, build-linux-arm64, build-macos]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download all release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/artifacts
          # Pull every asset already attached to the draft / published Release
          # for this tag.  Excludes any existing SHA256SUMS / SHA256SUMS.asc
          # so we recompute deterministically.
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir /tmp/artifacts \
            --pattern 'superscalar-*.tar.gz' \
            --pattern 'superscalar-*.zip' \
            --skip-existing
          ls -la /tmp/artifacts
      - name: Generate SHA256SUMS
        working-directory: /tmp/artifacts
        run: |
          # Deterministic order — sort by filename so the file content is
          # stable across re-runs.
          ls superscalar-*.tar.gz superscalar-*.zip 2>/dev/null \
            | LC_ALL=C sort \
            | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS
      - name: Upload SHA256SUMS to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" \
            /tmp/artifacts/SHA256SUMS \
            --repo "${{ github.repository }}" \
            --clobber
      # NOTE: detached signature (SHA256SUMS.asc) is produced and uploaded
      # manually by the release manager from an air-gapped signing host
      # — see docs/release-process.md "Hashing and signing release artifacts".
      # Automating GPG signing in CI would require committing a signing key
      # to repo secrets, which violates the air-gapped signing flow.
