name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Linux x86_64 binaries
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev
      - name: Build (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel
      - name: Package binaries
        run: |
          mkdir -p superscalar-${{ github.ref_name }}-linux-x86_64
          cp build/superscalar_lsp \
             build/superscalar_client \
             build/superscalar_bridge \
             build/superscalar_watchtower \
             superscalar-${{ github.ref_name }}-linux-x86_64/
          cp README.md LICENSE CHANGELOG.md SECURITY.md \
             superscalar-${{ github.ref_name }}-linux-x86_64/
          tar czf superscalar-${{ github.ref_name }}-linux-x86_64.tar.gz \
             superscalar-${{ github.ref_name }}-linux-x86_64/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            superscalar-${{ github.ref_name }}-linux-x86_64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    name: Linux ARM64 binaries
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler and deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu \
            libsqlite3-dev libssl-dev \
            libsqlite3-dev:arm64 libssl-dev:arm64 || true
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ noble main restricted universe multiverse' | sudo tee /etc/apt/sources.list.d/arm64.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ noble-updates main restricted universe multiverse' | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev:arm64 libssl-dev:arm64
      - name: Build (Release, cross-compile)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_FIND_ROOT_PATH=/usr/aarch64-linux-gnu \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY
          cmake --build build --parallel
      - name: Package binaries
        run: |
          mkdir -p superscalar-${{ github.ref_name }}-linux-arm64
          cp build/superscalar_lsp \
             build/superscalar_client \
             build/superscalar_bridge \
             build/superscalar_watchtower \
             superscalar-${{ github.ref_name }}-linux-arm64/
          cp README.md LICENSE CHANGELOG.md SECURITY.md \
             superscalar-${{ github.ref_name }}-linux-arm64/
          tar czf superscalar-${{ github.ref_name }}-linux-arm64.tar.gz \
             superscalar-${{ github.ref_name }}-linux-arm64/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            superscalar-${{ github.ref_name }}-linux-arm64.tar.gz

  build-macos:
    runs-on: macos-latest
    name: macOS binaries
    steps:
      - uses: actions/checkout@v4
      - name: Build (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel
      - name: Package binaries
        run: |
          mkdir -p superscalar-${{ github.ref_name }}-macos
          cp build/superscalar_lsp \
             build/superscalar_client \
             build/superscalar_bridge \
             build/superscalar_watchtower \
             superscalar-${{ github.ref_name }}-macos/
          cp README.md LICENSE CHANGELOG.md SECURITY.md \
             superscalar-${{ github.ref_name }}-macos/
          tar czf superscalar-${{ github.ref_name }}-macos.tar.gz \
             superscalar-${{ github.ref_name }}-macos/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            superscalar-${{ github.ref_name }}-macos.tar.gz
