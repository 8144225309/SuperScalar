name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: Linux,                sanitizers: false, tsan: false }
          - { os: macos-latest,   name: macOS,                sanitizers: false, tsan: false }
          - { os: ubuntu-latest,  name: "Linux (sanitizers)", sanitizers: true,  tsan: false }
          - { os: ubuntu-latest,  name: "Linux (TSan)",       sanitizers: false, tsan: true  }
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev
      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ matrix.os }}-
      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=${{ matrix.sanitizers && 'ON' || 'OFF' }} \
            -DENABLE_TSAN=${{ matrix.tsan && 'ON' || 'OFF' }} \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - name: Build
        run: cmake --build build --parallel
      - name: Unit tests
        env:
          # ASan: leaks fail the job (exitcode=23). Suppressions in test/sanitizer_suppressions/lsan.supp.
          # TSan: data races fail the job (halt_on_error=1). Suppressions in test/sanitizer_suppressions/tsan.supp.
          ASAN_OPTIONS: ${{ matrix.sanitizers && 'detect_leaks=1' || 'detect_leaks=0' }}
          LSAN_OPTIONS: ${{ matrix.sanitizers && 'exitcode=23:suppressions=test/sanitizer_suppressions/lsan.supp:print_suppressions=0' || '' }}
          TSAN_OPTIONS: ${{ matrix.tsan && 'halt_on_error=1:second_deadlock_stack=1:suppressions=test/sanitizer_suppressions/tsan.supp:print_suppressions=0' || '' }}
        run: |
          ulimit -s unlimited 2>/dev/null || ulimit -s 65520 2>/dev/null || true
          cd build && ./test_superscalar --unit

  arm64-build-test:
    runs-on: ubuntu-latest
    name: Linux ARM64
    if: github.event_name == 'push'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build and test in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            --ulimit stack=134217728:134217728 \
            -v "${{ github.workspace }}:/src" -w /src \
            ubuntu:24.04 bash -c '
              apt-get update && apt-get install -y cmake gcc g++ git \
                libsqlite3-dev libssl-dev autoconf libtool
              cmake -B build -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
              cmake --build build --parallel
              ulimit -s 131072 2>/dev/null || ulimit -s unlimited 2>/dev/null || true
              cd build && ./test_superscalar --unit
            '

  static-analysis:
    runs-on: ubuntu-latest
    name: Static Analysis
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libssl-dev cppcheck
      - name: Configure (generate compile_commands.json)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - name: Build (needed for FetchContent headers)
        run: cmake --build build --parallel
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --suppress=duplicateAssignExpression \
            --inline-suppr \
            --project=build/compile_commands.json \
            --error-exitcode=1 \
            -i build/_deps \
            2>&1

  regtest-tests:
    runs-on: ubuntu-latest
    name: Regtest Integration
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev
      - name: Cache Bitcoin Core binary
        id: btc-cache
        uses: actions/cache@v4
        with:
          path: bitcoin-28.1
          key: bitcoin-core-28.1-x86_64
      - name: Download Bitcoin Core 28.1
        if: steps.btc-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://bitcoincore.org/bin/bitcoin-core-28.1/bitcoin-28.1-x86_64-linux-gnu.tar.gz
          wget -q https://bitcoincore.org/bin/bitcoin-core-28.1/SHA256SUMS
          grep "bitcoin-28.1-x86_64-linux-gnu.tar.gz" SHA256SUMS | sha256sum -c -
          tar xzf bitcoin-28.1-x86_64-linux-gnu.tar.gz
      - name: Install Bitcoin Core
        run: sudo install -m 0755 bitcoin-28.1/bin/bitcoind bitcoin-28.1/bin/bitcoin-cli /usr/local/bin/
      - name: Configure regtest
        run: |
          mkdir -p ~/.bitcoin
          cat > ~/.bitcoin/bitcoin.conf <<CONF
          regtest=1
          server=1
          rpcuser=rpcuser
          rpcpassword=rpcpass
          fallbackfee=0.00001
          [regtest]
          rpcport=18443
          CONF
      - name: Start bitcoind
        run: |
          bitcoind -regtest -daemon
          sleep 3
          bitcoin-cli -regtest createwallet "test"
          bitcoin-cli -regtest -generate 101 > /dev/null
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel
      - name: Regtest tests
        run: |
          ulimit -s unlimited
          cd build && ./test_superscalar --regtest
      - name: Stop bitcoind
        if: always()
        run: bitcoin-cli -regtest stop 2>/dev/null || true

  regtest-multiprocess-sanitizers:
    runs-on: ubuntu-latest
    name: Regtest Multi-Process (sanitizers)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev
      - name: Cache Bitcoin Core binary
        id: btc-cache
        uses: actions/cache@v4
        with:
          path: bitcoin-28.1
          key: bitcoin-core-28.1-x86_64
      - name: Download Bitcoin Core 28.1
        if: steps.btc-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://bitcoincore.org/bin/bitcoin-core-28.1/bitcoin-28.1-x86_64-linux-gnu.tar.gz
          wget -q https://bitcoincore.org/bin/bitcoin-core-28.1/SHA256SUMS
          grep "bitcoin-28.1-x86_64-linux-gnu.tar.gz" SHA256SUMS | sha256sum -c -
          tar xzf bitcoin-28.1-x86_64-linux-gnu.tar.gz
      - name: Install Bitcoin Core
        run: sudo install -m 0755 bitcoin-28.1/bin/bitcoind bitcoin-28.1/bin/bitcoin-cli /usr/local/bin/
      - name: Configure regtest
        # The bash harnesses (set -euo pipefail) grep `^datadir=` from this
        # conf with no `|| true` fallback — under pipefail, an empty match
        # kills the script before any reset logic runs.  Include datadir
        # explicitly so the harness's reset path (rm -rf $datadir/regtest)
        # has something to act on.
        run: |
          mkdir -p ~/.bitcoin
          cat > ~/.bitcoin/bitcoin.conf <<CONF
          regtest=1
          server=1
          datadir=/home/runner/.bitcoin
          rpcuser=rpcuser
          rpcpassword=rpcpass
          fallbackfee=0.00001
          [regtest]
          rpcport=18443
          CONF
      # Build LSP/client/test binaries with ASan+LSan so the bash
      # multi-process harnesses (which spawn these binaries as separate
      # OS processes) catch heap leaks and aliasing in the wire-ceremony
      # driver code paths (lsp_subfactory_chain_advance, lsp_advance_leaf,
      # lsp_realloc_leaf — all introduced by PRs #136-#138).  These paths
      # are NOT exercised by the C-binary regtest suite (`./test_superscalar
      # --regtest` in regtest-tests above) — they only fire under the
      # multi-process bash harnesses below.  Skip TSan: it would flag
      # legitimate cross-process socket I/O as races and break the test.
      - name: Build (Debug + ASan + LSan)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=ON \
            -DENABLE_TSAN=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel
      # The bash harnesses default to /var/lib/bitcoind-regtest/bitcoin.conf
      # then fall back to $HOME/bitcoin-regtest/bitcoin.conf — neither is
      # the GitHub Actions setup (~/.bitcoin/bitcoin.conf).  Override via
      # REGTEST_CONF env so the BCLI helper inside the harness uses the
      # right config.
      - name: Multi-process k² sub-factory advance (under ASan+LSan)
        env:
          # verify_asan_link_order=0: harness wraps binaries with `stdbuf -oL`
          # which preloads libstdbuf.so via LD_PRELOAD before the ASan
          # runtime — without the override ASan aborts at libinit.
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=0:verify_asan_link_order=0
          LSAN_OPTIONS: exitcode=23:suppressions=test/sanitizer_suppressions/lsan.supp:print_suppressions=0
          REGTEST_CONF: /home/runner/.bitcoin/bitcoin.conf
        run: |
          ulimit -s unlimited 2>/dev/null || ulimit -s 65520 2>/dev/null || true
          bash tools/test_multiprocess_subfactory_advance.sh build
      - name: Multi-process MuSig N=8 PS (under ASan+LSan)
        env:
          # verify_asan_link_order=0: harness wraps binaries with `stdbuf -oL`
          # which preloads libstdbuf.so via LD_PRELOAD before the ASan
          # runtime — without the override ASan aborts at libinit.
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=0:verify_asan_link_order=0
          LSAN_OPTIONS: exitcode=23:suppressions=test/sanitizer_suppressions/lsan.supp:print_suppressions=0
          REGTEST_CONF: /home/runner/.bitcoin/bitcoin.conf
        run: |
          ulimit -s unlimited 2>/dev/null || ulimit -s 65520 2>/dev/null || true
          bash tools/test_multiprocess_musig_n8.sh build
      - name: Stop bitcoind
        if: always()
        run: bitcoin-cli -regtest stop 2>/dev/null || true

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev lcov
      - name: Build with coverage
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel
      - name: Run tests
        run: ulimit -s unlimited && cd build && ./test_superscalar --unit
      - name: Generate coverage report
        run: |
          cd build
          lcov --capture --directory . --output-file coverage.info \
               --ignore-errors mismatch --ignore-errors unused
          lcov --remove coverage.info '*/build/_deps/*' '/usr/*' '*/tests/*' \
               --output-file filtered.info --ignore-errors unused
          genhtml filtered.info --output-directory coverage_report/ \
               --ignore-errors unused
      - name: Coverage summary
        run: |
          cd build
          lcov --summary filtered.info 2>&1 | tee coverage-summary.txt
          LINES=$(grep 'lines' coverage-summary.txt | grep -oP '[\d.]+%' | head -1)
          echo "### Coverage: $LINES" >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage_report/

  fuzz:
    runs-on: ubuntu-latest
    name: Fuzz Testing
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libssl-dev clang
      - name: Build fuzz targets
        run: |
          CC=clang cmake -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_FUZZING=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel --target fuzz_wire_recv fuzz_wire_parse_json \
            fuzz_tx_sighash fuzz_persist_load fuzz_hex_decode \
            fuzz_noise_handshake fuzz_aead_decrypt
      - name: Run fuzz (5 min each)
        run: |
          cd build
          for target in fuzz_wire_recv fuzz_wire_parse_json fuzz_tx_sighash \
                        fuzz_persist_load fuzz_hex_decode \
                        fuzz_noise_handshake fuzz_aead_decrypt; do
              mkdir -p corpus/$target
              timeout 300 ./$target corpus/$target/ -max_total_time=300 || true
          done
