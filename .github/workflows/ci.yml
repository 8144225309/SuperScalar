name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  cc: gcc,   name: "Linux",                  sanitizers: false }
          - { os: ubuntu-latest,  cc: clang, name: "Linux (Clang)",          sanitizers: false }
          - { os: macos-latest,   cc: clang, name: "macOS",                  sanitizers: false }
          - { os: ubuntu-latest,  cc: gcc,   name: "Linux (sanitizers)",     sanitizers: true  }
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev

      - name: Cache CMake build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            build/_deps
          key: deps-${{ matrix.os }}-${{ matrix.cc }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ matrix.os }}-${{ matrix.cc }}-

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=${{ matrix.sanitizers && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Unit tests
        env:
          ASAN_OPTIONS: ${{ matrix.sanitizers && 'detect_leaks=1' || 'detect_leaks=0' }}
          LSAN_OPTIONS: ${{ matrix.sanitizers && 'exitcode=0' || '' }}
        run: |
          ulimit -s unlimited 2>/dev/null || ulimit -s 65520 2>/dev/null || true
          ctest --test-dir build -R unit_tests --output-on-failure --timeout 180

  arm64-build-test:
    runs-on: ubuntu-latest
    name: Linux ARM64
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build and test in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" -w /src \
            ubuntu:24.04 bash -c '
              apt-get update && apt-get install -y cmake gcc g++ git \
                libsqlite3-dev libssl-dev autoconf libtool
              cmake -B build -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
              cmake --build build --parallel
              ulimit -s unlimited 2>/dev/null || ulimit -s 65520 2>/dev/null || true
              cd build && ./test_superscalar --unit
            '

  static-analysis:
    runs-on: ubuntu-latest
    name: Static Analysis
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libssl-dev cppcheck clang-tidy

      - name: Cache CMake build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: build/_deps
          key: deps-analysis-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-analysis-

      - name: Configure (generate compile_commands.json)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build (needed for FetchContent headers)
        run: cmake --build build --parallel

      - name: cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --suppress=duplicateAssignExpression \
            --inline-suppr \
            --project=build/compile_commands.json \
            --error-exitcode=1 \
            -i build/_deps \
            2>&1

      - name: clang-tidy (security + bugprone)
        continue-on-error: true
        run: |
          find src/ -name '*.c' | xargs clang-tidy \
            -p build \
            --checks='-*,bugprone-*,cert-*,clang-analyzer-*,-bugprone-easily-swappable-parameters,-bugprone-reserved-identifier,-cert-dcl37-c,-cert-dcl51-cpp' \
            --warnings-as-errors='clang-analyzer-*' \
            2>&1 || echo "::warning::clang-tidy found issues (see above)"

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lcov

      - name: Cache CMake build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: build/_deps
          key: deps-coverage-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-coverage-

      - name: Configure with coverage
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build -R unit_tests --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch
          lcov --remove coverage.info \
            '*/build/_deps/*' '*/tests/*' '/usr/*' \
            --output-file coverage-filtered.info \
            --ignore-errors unused
          lcov --list coverage-filtered.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-filtered.info

  regtest-tests:
    runs-on: ubuntu-latest
    name: Regtest Integration
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev

      - name: Cache Bitcoin Core binary
        id: btc-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: bitcoin-28.1
          key: bitcoin-core-28.1-x86_64

      - name: Download Bitcoin Core 28.1
        if: steps.btc-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://bitcoincore.org/bin/bitcoin-core-28.1/bitcoin-28.1-x86_64-linux-gnu.tar.gz
          wget -q https://bitcoincore.org/bin/bitcoin-core-28.1/SHA256SUMS
          grep "bitcoin-28.1-x86_64-linux-gnu.tar.gz" SHA256SUMS | sha256sum -c -
          tar xzf bitcoin-28.1-x86_64-linux-gnu.tar.gz

      - name: Install Bitcoin Core
        run: sudo install -m 0755 bitcoin-28.1/bin/bitcoind bitcoin-28.1/bin/bitcoin-cli /usr/local/bin/

      - name: Configure regtest
        run: |
          mkdir -p ~/.bitcoin
          cat > ~/.bitcoin/bitcoin.conf <<'CONF'
          regtest=1
          server=1
          rpcuser=rpcuser
          rpcpassword=rpcpass
          fallbackfee=0.00001
          [regtest]
          rpcport=18443
          CONF

      - name: Start bitcoind
        run: |
          bitcoind -regtest -daemon
          sleep 3
          bitcoin-cli -regtest createwallet "test"
          bitcoin-cli -regtest -generate 101 > /dev/null

      - name: Cache CMake build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: build/_deps
          key: deps-regtest-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-regtest-

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --parallel

      - name: Regtest tests
        run: |
          ulimit -s unlimited
          cd build && ./test_superscalar --regtest

      - name: Stop bitcoind
        if: always()
        run: bitcoin-cli -regtest stop 2>/dev/null || true

  fuzz:
    runs-on: ubuntu-latest
    name: Fuzz Testing
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libssl-dev clang
      - name: Build fuzz targets
        run: |
          CC=clang cmake -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_FUZZING=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --parallel --target fuzz_wire_recv fuzz_wire_parse_json \
            fuzz_tx_sighash fuzz_persist_load fuzz_hex_decode \
            fuzz_noise_handshake fuzz_aead_decrypt
      - name: Run fuzz (5 min each)
        run: |
          cd build
          for target in fuzz_wire_recv fuzz_wire_parse_json fuzz_tx_sighash \
                        fuzz_persist_load fuzz_hex_decode \
                        fuzz_noise_handshake fuzz_aead_decrypt; do
              mkdir -p corpus/$target
              timeout 300 ./$target corpus/$target/ -max_total_time=300 || true
          done
